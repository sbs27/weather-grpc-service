services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  weather-service:
    build: .
    ports:
      - "50051:50051"
    environment:
      # CRITICAL: We change 'localhost' to 'db' because inside 
      # Docker, the service name is the hostname!
      DB_URL: "postgres://user:password@db:5432/weather_db"
    depends_on:
      - db

volumes:
  postgres_data: